name: CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build Backend
        run: docker build -t jhoninfracontrol/backend ./back1

      - name: Build Frontend
        run: docker build -t jhoninfracontrol/frontend ./front1

      - name: Push imagens
        run: |
          docker push jhoninfracontrol/backend
          docker push jhoninfracontrol/frontend

      - name: Deploy no Servidor
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.MY_SERVER_SECRET }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull leona/backend
            docker pull leona/frontend
            docker-compose down
            docker-compose up -d
