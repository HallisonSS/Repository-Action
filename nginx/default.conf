# nginx/default.conf

# Definição dos servidores upstream (nomes dos serviços no docker-compose)
upstream frontend {
    server frontend:80;
}

upstream backend {
    server backend:3000; # Substitua pela porta real do seu backend
}

server {
    listen 80;
    server_name localhost;

    # Logs para facilitar o debug caso algo dê errado
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Tudo que for /api vai para o Backend
    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Ajustes para evitar timeouts em requisições longas
        proxy_read_timeout 90;
    }

    # Todo o resto do tráfego vai para o Frontend
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Suporte a WebSockets (comum em React/Vite/Next.js para Hot Reload ou conexões reais)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
